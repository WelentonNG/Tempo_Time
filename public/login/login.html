<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Tempo Time</title>
  <link rel="stylesheet" href="/login/login.css">
</head>

<body>
  <div class="page">
    <div class="login-box">
      <div class="logo">🌤️</div>
      <h2>Tempo Time</h2>
      <p class="subtitle">Faça login para continuar</p>

      <form id="loginForm">
        <div class="field">
          <label>Usuário</label>
          <input type="text" id="InputLogin" placeholder="Digite seu usuário" required>
        </div>

        <div class="field">
          <label>Senha</label>
          <input type="password" id="inputPassword" placeholder="Digite sua senha" required>
        </div>

        <button type="submit">Entrar</button>
      </form>

      <p class="link-cadastro">Não tem conta? <a href="/cadastro/cadastro.html">Criar conta</a></p>
    </div>
  </div>

  <script src="/login/login.js"></script>
</body>
</html>
